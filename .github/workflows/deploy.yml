name: Deploy Maintenance Véhicules to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/slayercode1/ia_cmv-api
  IMAGE_MLFLOW: ghcr.io/slayercode1/ia_cmv-mlflow

jobs:
  # ─── Job 1 : Tests ───
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest app/test_main.py -v

  # ─── Job 2 : Build & Push des images Docker ───
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Image API FastAPI ---
      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Image MLflow ---
      - name: Extract metadata (MLflow)
        id: meta-mlflow
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_MLFLOW }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push MLflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mlflow
          push: true
          tags: ${{ steps.meta-mlflow.outputs.tags }}
          labels: ${{ steps.meta-mlflow.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3 : Déploiement sur le VPS ───
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.prod.yml"
          target: "/tmp/ia-cmv-deploy"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GH_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: GH_TOKEN,GH_USER
          script: |
            # Créer le répertoire s'il n'existe pas
            if [ ! -d "/var/html/ia-cmv" ]; then
              sudo mkdir -p /var/html/ia-cmv
              sudo chown -R $USER:$USER /var/html/ia-cmv
            fi

            # Copier le compose et nettoyer le temp
            cp /tmp/ia-cmv-deploy/docker-compose.prod.yml /var/html/ia-cmv/docker-compose.yml
            rm -rf /tmp/ia-cmv-deploy

            cd /var/html/ia-cmv

            # Login au GitHub Container Registry
            echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_USER}" --password-stdin

            # Pull et redémarrer les conteneurs
            docker compose pull
            docker compose up -d

            # Nettoyage des anciennes images
            docker image prune -f

            echo "Deployment complete!"
